<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfish Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header glass">
        <h1><span>Starfish</span> Agent</h1>
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="settings-btn" onclick="openSettings()" title="设置">&#9881;</button>
            <button class="settings-btn" onclick="openMcp()" title="MCP 服务端">&#128268;</button>
            <span class="header-info"><span class="status-dot"></span>在线</span>
        </div>
    </header>

    <div class="control-toggle">
        <button class="toggle-btn glass" onclick="togglePanel()">
            <span id="toggleIcon">&#9660;</span> 控制面板
        </button>
    </div>

    <div class="control-panel glass" id="controlPanel">
        <div class="control-inner">
            <div class="btn-group">
                <button class="btn btn-evolve" onclick="doEvolve(false)" id="btn-evolve">&#128260; 预览</button>
                <button class="btn btn-apply" onclick="doEvolve(true)" id="btn-apply">&#10004; 执行</button>
                <button class="btn btn-snapshot" onclick="takeSnapshot()">&#128247; 快照</button>
                <button class="btn btn-rollback" onclick="doRollback()">&#8617; 回滚</button>
            </div>
            <div class="snapshot-section">
                <div class="snapshot-label">选择快照后点击回滚</div>
                <div class="snapshot-list" id="snapshotList">加载中...</div>
            </div>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message assistant">
            你好！我是 Starfish Agent，随时为你效劳。
            <span class="time" id="welcomeTime"></span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper glass">
            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="handleKey(event)">
            <button class="send-btn" onclick="send()" id="sendBtn">&#10148;</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettingsOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">LLM 设置</div>
                <button class="modal-close" onclick="closeSettings()">&times;</button>
            </div>
            <div class="form-group">
                <label>模型名称 (LLM_MODEL)</label>
                <input type="text" id="settingModel" placeholder="例如: gpt-4">
            </div>
            <div class="form-group">
                <label>API 地址 (LLM_BASE_URL)</label>
                <input type="text" id="settingBaseUrl" placeholder="例如: https://api.openai.com/v1">
            </div>
            <div class="form-group">
                <label>API 密钥 (LLM_API_KEY)</label>
                <input type="password" id="settingApiKey" placeholder="your-api-key">
            </div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="closeSettings()">取消</button>
                <button class="modal-btn modal-btn-primary" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <!-- MCP 服务端管理弹窗 -->
    <div class="modal-overlay" id="mcpModal" onclick="closeMcpOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()" style="max-width:760px;">
            <div class="modal-header">
                <div class="modal-title">MCP 服务端</div>
                <button class="modal-close" onclick="closeMcp()">&times;</button>
            </div>

            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
                <button class="modal-btn modal-btn-primary" onclick="showMcpForm()">+ 新增</button>
                <button class="modal-btn modal-btn-secondary" onclick="reloadMcp()">重新连接</button>
                <button class="modal-btn modal-btn-secondary" onclick="loadMcpTools()">查看已加载工具</button>
            </div>

            <div id="mcpList" style="max-height:300px;overflow:auto;border:1px solid #eee;border-radius:8px;padding:8px;">
                加载中...
            </div>

            <div id="mcpTools" style="margin-top:12px;color:#555;font-size:13px;"></div>

            <div id="mcpForm" style="display:none;margin-top:12px;border-top:1px solid #eee;padding-top:12px;">
                <input type="hidden" id="mcpFormId" value="">
                <div class="form-group">
                    <label>名称（唯一）</label>
                    <input type="text" id="mcpName" placeholder="例如: mysql-local">
                </div>
                <div class="form-group">
                    <label>传输协议</label>
                    <select id="mcpTransport" onchange="onMcpTransportChange()">
                        <option value="http">http (推荐)</option>
                        <option value="stdio">stdio</option>
                    </select>
                </div>
                <div class="form-group" id="mcpUrlGroup">
                    <label>服务地址（url，http 协议必填）</label>
                    <input type="text" id="mcpUrl" placeholder="例如: http://localhost:8801/mcp">
                </div>
                <div class="form-group" id="mcpCmdGroup">
                    <label>启动命令（command，stdio 协议必填）</label>
                    <input type="text" id="mcpCommand" placeholder="例如: python">
                </div>
                <div class="form-group" id="mcpArgsGroup">
                    <label>启动参数（args，JSON 数组，stdio 用）</label>
                    <input type="text" id="mcpArgs" placeholder='例如: ["/abs/path/mysql_server.py"]'>
                </div>
                <div class="form-group">
                    <label>环境变量（env，JSON 对象）</label>
                    <input type="text" id="mcpEnv" placeholder='例如: {"MYSQL_HOST":"127.0.0.1"}'>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input type="text" id="mcpDesc" placeholder="可选">
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:8px;">
                    <label style="margin:0;">启用</label>
                    <input type="checkbox" id="mcpEnabled" checked>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn modal-btn-secondary" onclick="cancelMcpForm()">取消</button>
                    <button class="modal-btn modal-btn-primary" onclick="saveMcp()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
</html>
